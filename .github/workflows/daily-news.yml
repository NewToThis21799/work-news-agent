name: Daily Canadian mutual fund news

on:
  schedule:
    - cron: "15 10 * * *"
    - cron: "15 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create briefing issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/canadian_mutual_fund_news.py
